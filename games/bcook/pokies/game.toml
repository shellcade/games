# Bare name: [a-z0-9-]{1,32}, no slash. MUST equal the directory name.
# The platform composes the namespaced slug "bcook/pokies" from the catalog
# path games/<shellcade-username>/<name>; game.toml never carries it.
name = "pokies"

# Human-facing title shown in the lobby.
display_name = "Pokies"

# <= 200 characters.
description = "A no-winner social slot machine. Pull the lever on your own 3-reel cabinet, chase your high score, and watch the floor light up when someone lands a big win."

# SPDX id from the allowlist: MIT, Apache-2.0, BSD-3-Clause, MPL-2.0, Unlicense.
license = "MIT"

# Optional discovery tags ([a-z0-9-]{1,32} each).
tags = ["slots", "casual"]

# Player count, within the platform caps 1..8.
[players]
min = 1
max = 5
