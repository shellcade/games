# Bare name: [a-z0-9-]{1,32}, no slash. MUST equal the directory name.
# The platform composes the namespaced slug "bcook/shellracer" from the
# catalog path games/<shellcade-username>/<name>; game.toml never carries it.
name = "shellracer"

# Human-facing title shown in the lobby.
display_name = "Shell Racer"

# <= 200 characters.
description = "Race opponents by typing a passage faster and more accurately. Server-validated keystrokes, live WPM and progress, and a ranked finish."

# SPDX id from the allowlist: MIT, Apache-2.0, BSD-3-Clause, MPL-2.0, Unlicense.
license = "MIT"

# Optional discovery tags ([a-z0-9-]{1,32} each).
tags = ["typing", "race"]

# Player count, within the platform caps 1..8 (native meta: min 1, max 5).
[players]
min = 1
max = 5
