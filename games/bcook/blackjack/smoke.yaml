seed: 58
seats: 2
heartbeat: 50ms
steps:
  # (a) Initial table: both seats parked at the bet prompt. The table rules now
  # flank the dealer (out of the mid-felt), and the betting prompt offers the
  # Left/Right Perfect Pairs axis alongside the Up/Down stake.
  - shot: bet

  # Seat 0 turns on a Perfect Pairs side bet (Right -> 10) and bets the default
  # stake (25); seat 1 sets a larger side bet (Right Right -> 25) and bets. Once
  # both seated players have placed, a 1s grace beat elapses and the table deals.
  - seat: 0
  - key: right
  - key: space
  - seat: 1
  - key: right
  - key: right
  - key: space

  # (b) Both placed: each seat shows its side stake as "+pairs N" beside the bet.
  - shot: sidebet

  # Grace beat (1s) -> deal fires. Sweep past the staggered slide+flip deal
  # animation (6 cards), as the original scenario did.
  - advance: 1200ms
  - advance: 1200ms

  # (c) Deal complete: seed 58 deals BOTH seats a pair, so Perfect Pairs pays out
  # at the deal (mixed 6:1 each); seat 0 (a pair of tens) is first on turn.
  - shot: dealt

  # Seat 0 splits its pair -> two hands, rendered as stacked compact lines with
  # the hand on turn marked. Sweep the split deal animation before the shot.
  - seat: 0
  - rune: "p"
  - advance: 700ms
  - shot: split

  # Seat 0 stands both split hands; the turn walks hand to hand, then to seat 1.
  - rune: "s"
  - advance: 200ms
  - rune: "s"
  - advance: 200ms

  # Seat 1 stands on its 20.
  - seat: 1
  - rune: "s"
  - advance: 200ms

  # All hands resolved -> the dealer reveals its hole card and stands; sweep the
  # paced reveal into the results flash.
  - advance: 1600ms
  - advance: 1600ms
  - advance: 1600ms

  # (d) Settlement: per-seat result, with the Perfect Pairs win folded into each
  # seat's net and the winning category shown beneath the seat.
  - shot: payout

  # (e) Ready-up: seat 0 confirms and reads READY while the table waits on seat 1;
  # once seat 1 confirms too the round skips the flash and deals again.
  - seat: 0
  - key: space
  - shot: ready
  - seat: 1
  - key: space
  - advance: 100ms
  - shot: next
