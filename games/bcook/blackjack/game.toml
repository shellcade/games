# Bare name: [a-z0-9-]{1,32}, no slash. MUST equal the directory name.
# The platform composes the namespaced slug "bcook/blackjack" from the catalog
# path games/<shellcade-username>/<name>; game.toml never carries it.
name = "blackjack"

# Human-facing title shown in the lobby.
display_name = "Blackjack"

# <= 200 characters.
description = "Take a seat at a shared dealer table: bet, hit, stand, double, split, surrender. Dealer stands on 17, blackjack pays 3:2. Start with 1000 chips and chase your high score."

# SPDX id from the allowlist: MIT, Apache-2.0, BSD-3-Clause, MPL-2.0, Unlicense.
license = "MIT"

# Optional discovery tags ([a-z0-9-]{1,32} each).
tags = ["cards", "casino"]

# Player count, within the platform caps 1..8.
[players]
min = 1
max = 5
