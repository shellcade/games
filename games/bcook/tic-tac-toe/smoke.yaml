seed: 42
seats: 2
steps:
  # Both seats joined; game renders on join. Empty 1-9 grid, X to move.
  - shot: opening

  # X (seat 0) and O (seat 1) trade moves. X starts.
  - seat: 0
  - rune: "1" # X top-left
  - seat: 1
  - rune: "5" # O center
  - seat: 0
  - rune: "2" # X top-middle
  - shot: midgame

  # Finish: O blocks elsewhere, X completes the top row (1,2,3) for the win.
  - seat: 1
  - rune: "4" # O middle-left
  - seat: 0
  - rune: "3" # X top-right -> three in a row, X wins
  - shot: win
