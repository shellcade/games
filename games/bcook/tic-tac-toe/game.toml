# Bare name: [a-z0-9-]{1,32}, no slash. MUST equal the directory name.
# The platform composes the namespaced slug "bcook/tic-tac-toe" from the
# catalog path games/<shellcade-username>/<name>; game.toml never carries it.
name = "tic-tac-toe"

# Human-facing title shown in the lobby.
display_name = "Tic-Tac-Toe"

# <= 200 characters.
description = "Classic two-player noughts and crosses. Pick a cell 1-9 on your turn; first to three in a row wins, a full board draws. 60s per turn or you forfeit."

# SPDX id from the allowlist: MIT, Apache-2.0, BSD-3-Clause, MPL-2.0, Unlicense.
license = "MIT"

# Optional discovery tags ([a-z0-9-]{1,32} each).
tags = ["board", "two-player", "classic"]

# Player count, within the platform caps 1..8.
[players]
min = 2
max = 2
