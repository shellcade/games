# Bare name: [a-z0-9-]{1,32}, must equal the directory name. The platform
# composes the namespaced slug "alan/chess" from the catalog path.
name = "chess"

# Human-facing title shown in the lobby.
display_name = "Chess"

# <= 200 characters.
description = "A two-player chess duel on a perft-verified engine — pair up, beat the blitz clock, mate the king. Cursor-driven move entry, draw offers, resignation."

# SPDX id from the allowlist.
license = "MIT"

# Discovery tags.
tags = ["chess", "strategy", "board"]

# Two-player only.
[players]
min = 2
max = 2
