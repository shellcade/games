name: validate
on:
  pull_request:

# Single source of truth for the toolchain. Bump these (and publish.yml, which
# pins the same versions) together; CI must be reproducible across re-runs.
env:
  KIT_VERSION: "2.1.1"          # shellcade-kit release (tag v$KIT_VERSION) — ABI v2 + smoke
  TINYGO_VERSION: "0.41.0"
  BINARYEN_VERSION: "version_123"
  GO_VERSION: "1.25"
  FREEZE_VERSION: "0.2.2"       # charmbracelet/freeze — ANSI shot → SVG preview

jobs:
  submissions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: changed game dirs
        id: changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          dirs=$(git diff --name-only "$base"...HEAD -- 'games/**' | awk -F/ 'NF>=3 {print $1"/"$2"/"$3}' | sort -u)
          { echo "dirs<<EOF"; echo "$dirs"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          # Files outside games/ are maintainer-only plumbing. The maintainer
          # test is the author's REPO PERMISSION (admin/maintain/write), not
          # author_association — association reports MEMBER/OWNER only when the
          # org membership is PUBLIC, so a private-membership org admin would
          # read as a plain contributor. The permission endpoint needs only the
          # metadata read every workflow token has (fork PRs included).
          outside=$(git diff --name-only "$base"...HEAD | grep -v '^games/' || true)
          if [ -n "$outside" ]; then
            author="${{ github.event.pull_request.user.login }}"
            level=$(gh api "repos/${{ github.repository }}/collaborators/${author}/permission" \
                      --jq .permission 2>/dev/null || echo none)
            case "$level" in
              admin|maintain|write) echo "maintainer ($level): plumbing changes allowed" ;;
              *) echo "::error::PR touches files outside games/: $outside"; exit 1 ;;
            esac
          fi

      # Authorship is no longer checked here. Namespace ownership is authorized
      # by the separate authorize.yml job, which asks the shellcade API whether
      # the PR author's GitHub login is linked to the path's shellcade username
      # (with maintainer review as the gate until that endpoint's secret is set).
      # This workflow only validates the directory contract and that the game
      # builds and passes conformance.

      - name: validate game directory (module, LICENSE, no artifacts)
        if: steps.changed.outputs.dirs != ''
        run: |
          while read -r d; do
            [ -z "$d" ] && continue
            python3 .github/scripts/validate_game_dir.py "$d"
          done <<< "${{ steps.changed.outputs.dirs }}"

      - uses: actions/setup-go@v5
        if: steps.changed.outputs.dirs != ''
        with: { go-version: "${{ env.GO_VERSION }}" }
      - uses: acifani/setup-tinygo@v2
        if: steps.changed.outputs.dirs != ''
        with: { tinygo-version: "${{ env.TINYGO_VERSION }}" }

      # Rust games (Cargo.toml module marker) build with the runner's stable
      # rustup toolchain; only the wasm target needs adding (publish.yml pins
      # the same way).
      - name: rust wasm32-wasip1 target (for Cargo games)
        if: steps.changed.outputs.dirs != ''
        run: rustup target add wasm32-wasip1

      # Pin binaryen to an exact release (TinyGo shells out to wasm-opt) and
      # verify it against the release's published .sha256 before use.
      - name: binaryen
        if: steps.changed.outputs.dirs != ''
        run: |
          base="https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}"
          tarball="binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          curl -fsSL -o "$tarball" "$base/$tarball"
          curl -fsSL -o "$tarball.sha256" "$base/$tarball.sha256"
          sha256sum -c "$tarball.sha256"
          tar xzf "$tarball"
          echo "$PWD/binaryen-${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      # Pin shellcade-kit to an exact release and verify the download against
      # the release's checksums.txt before running it.
      - name: shellcade-kit
        if: steps.changed.outputs.dirs != ''
        run: |
          base="https://github.com/shellcade/kit/releases/download/v${KIT_VERSION}"
          tarball="shellcade-kit_${KIT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "$tarball" "$base/$tarball"
          curl -fsSL -o checksums.txt "$base/checksums.txt"
          grep " $tarball\$" checksums.txt | sha256sum -c -
          tar xzf "$tarball"
          ./shellcade-kit version

      # Pin freeze (ANSI → SVG) to an exact release and verify against the
      # release's checksums.txt; it renders the smoke shots into the preview
      # images the smoke-preview workflow publishes.
      - name: freeze
        if: steps.changed.outputs.dirs != ''
        run: |
          base="https://github.com/charmbracelet/freeze/releases/download/v${FREEZE_VERSION}"
          tarball="freeze_${FREEZE_VERSION}_Linux_x86_64.tar.gz"
          curl -fsSL -o "$tarball" "$base/$tarball"
          curl -fsSL -o freeze-checksums.txt "$base/checksums.txt"
          grep " $tarball\$" freeze-checksums.txt | sha256sum -c -
          tar xzf "$tarball" "freeze_${FREEZE_VERSION}_Linux_x86_64/freeze"
          echo "$PWD/freeze_${FREEZE_VERSION}_Linux_x86_64" >> "$GITHUB_PATH"

      - name: build + conformance per game
        if: steps.changed.outputs.dirs != ''
        run: |
          while read -r d; do
            [ -z "$d" ] && continue
            echo "=== $d ==="
            # Module marker decides the toolchain — mirrors publish.yml:
            # go.mod => TinyGo (dev profile), Cargo.toml => cargo/wasm32-wasip1.
            if [ -f "$d/go.mod" ]; then
              ( cd "$d" && go mod tidy && tinygo build -opt=1 -no-debug -gc=leaking -o game.wasm -target wasip1 -buildmode=c-shared . )
            elif [ -f "$d/Cargo.toml" ]; then
              crate=$(sed -n 's/^name *= *"\(.*\)"/\1/p' "$d/Cargo.toml" | head -1)
              ( cd "$d" && cargo build --release --target wasm32-wasip1 )
              cp "$d/target/wasm32-wasip1/release/${crate//-/_}.wasm" "$d/game.wasm"
            else
              echo "::error::$d has no module marker (go.mod or Cargo.toml)"; exit 1
            fi
            ./shellcade-kit check "$d/game.wasm"

            # The artifact IS the metadata: assert it agrees with the path.
            meta=$(./shellcade-kit meta "$d/game.wasm")
            echo "$meta"
            name=$(echo "$d" | cut -d/ -f3)
            slug=$(echo "$meta" | jq -r .slug)
            minp=$(echo "$meta" | jq -r .minPlayers)
            maxp=$(echo "$meta" | jq -r .maxPlayers)
            if [ "$slug" != "$name" ]; then
              echo "::error::$d: artifact meta slug '$slug' must equal the directory name '$name'"; exit 1
            fi
            if [ "$minp" -lt 1 ] || [ "$maxp" -gt 8 ] || [ "$minp" -gt "$maxp" ]; then
              echo "::error::$d: player bounds $minp-$maxp outside the platform's 1..8"; exit 1
            fi
          done <<< "${{ steps.changed.outputs.dirs }}"

      # Smoke: run each changed game's smoke.yaml against the artifact just
      # built (the script is validated and executed by shellcade-kit; a missing
      # or broken script fails the PR), render every shot to SVG with the
      # pinned freeze, and bundle the lot for the preview workflow. This job
      # runs WITHOUT secrets (fork-safe); smoke-preview.yml (base-repo
      # context) publishes the images and posts the sticky comment.
      - name: smoke screens per game
        if: steps.changed.outputs.dirs != ''
        run: |
          mkdir -p previews
          games_json='[]'
          while read -r d; do
            [ -z "$d" ] && continue
            owner=$(echo "$d" | cut -d/ -f2); game=$(echo "$d" | cut -d/ -f3)
            out="previews/${owner}-${game}"
            echo "=== smoke $d ==="
            ./shellcade-kit smoke "$d/game.wasm" --out "$out"
            shots='[]'
            for ansi in "$out"/*.ansi; do
              freeze "$ansi" --language ansi -o "${ansi%.ansi}.svg"
              shots=$(echo "$shots" | jq -c --arg s "$(basename "${ansi%.ansi}.svg")" '. + [$s]')
            done
            games_json=$(echo "$games_json" | jq -c --arg dir "$d" --arg sub "${owner}-${game}" --argjson shots "$shots" '. + [{dir: $dir, sub: $sub, shots: $shots}]')
          done <<< "${{ steps.changed.outputs.dirs }}"
          jq -n --argjson games "$games_json" \
            --arg pr "${{ github.event.pull_request.number }}" \
            --arg sha "${{ github.event.pull_request.head.sha }}" \
            '{pr: ($pr|tonumber), sha: $sha, games: $games}' > previews/manifest.json
          cat previews/manifest.json

      - name: upload smoke previews
        if: steps.changed.outputs.dirs != ''
        uses: actions/upload-artifact@v4
        with:
          name: smoke-previews
          path: previews/
          retention-days: 14
