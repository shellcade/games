name: publish
on:
  push:
    branches: [main]
    paths:
      - "games/**"
  workflow_dispatch: {} # manual sanity runs (walks every game dir)

# Single source of truth for the toolchain — keep in lockstep with validate.yml.
env:
  KIT_VERSION: "2.1.0"          # shellcade-kit release (tag v$KIT_VERSION) — ABI v2 + smoke
  TINYGO_VERSION: "0.41.0"
  BINARYEN_VERSION: "version_123"
  GO_VERSION: "1.25"

# Need write access to cut releases; GITHUB_TOKEN only, no external secrets.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history + all tags for N derivation

      - name: changed game dirs
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual sanity run: walk every game dir (publish is idempotent —
            # unchanged digests are skipped per-release below).
            dirs=$(find games -mindepth 2 -maxdepth 2 -type d | sort)
          else
            # Diff the merge commit against its first parent (main before merge).
            before="${{ github.event.before }}"
            if ! git cat-file -e "$before^{commit}" 2>/dev/null || \
               [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="${{ github.sha }}^"   # first push / shallow: fall back to parent
            fi
            dirs=$(git diff --name-only "$before" "${{ github.sha }}" -- 'games/**' \
                   | awk -F/ 'NF>=3 {print $1"/"$2"/"$3}' | sort -u)
          fi
          { echo "dirs<<EOF"; echo "$dirs"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        if: steps.changed.outputs.dirs != ''
        with: { go-version: "${{ env.GO_VERSION }}" }
      - uses: acifani/setup-tinygo@v2
        if: steps.changed.outputs.dirs != ''
        with: { tinygo-version: "${{ env.TINYGO_VERSION }}" }

      # Rust games (Cargo.toml module marker) build with the runner's stable
      # rustup toolchain; only the wasm target needs adding.
      - name: rust wasm32-wasip1 target (for Cargo games)
        if: steps.changed.outputs.dirs != ''
        run: rustup target add wasm32-wasip1

      # Pin binaryen to an exact release and verify before use (wasm-opt powers
      # the -opt=2 release build).
      - name: binaryen
        if: steps.changed.outputs.dirs != ''
        run: |
          base="https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}"
          tarball="binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          curl -fsSL -o "$tarball" "$base/$tarball"
          curl -fsSL -o "$tarball.sha256" "$base/$tarball.sha256"
          sha256sum -c "$tarball.sha256"
          tar xzf "$tarball"
          echo "$PWD/binaryen-${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: build, digest, and release per game
        if: steps.changed.outputs.dirs != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Arcade auto-publish (add-game-versions): after each release is cut,
          # CI asks the arcade to verify+promote it per the arcade's publish
          # policy (graduated default: live games auto-update; first publishes
          # wait for admin go-live). The arcade re-verifies everything locally
          # (digest + conformance) — this call carries no trust, only the tag.
          PUBLISH_ENDPOINT: "https://shellcade.com/admin/game:publish"
          ADMIN_SECRET: ${{ secrets.SHELLCADE_ADMIN_SECRET }}
        run: |
          set -euo pipefail
          while read -r d; do
            [ -z "$d" ] && continue
            echo "=== $d ==="
            # Module marker decides the toolchain — mirrors validate_game_dir.py:
            # go.mod => TinyGo, Cargo.toml => cargo/wasm32-wasip1.
            if [ ! -f "$d/go.mod" ] && [ ! -f "$d/Cargo.toml" ]; then
              echo "::error::$d has no module marker (go.mod or Cargo.toml)"; exit 1
            fi

            owner=$(echo "$d" | cut -d/ -f2)    # shellcade username
            game=$(echo "$d" | cut -d/ -f3)     # bare game name (== artifact meta slug)
            echo "owner=$owner game=$game"

            # Best-effort GitHub attribution for the release notes: resolve the
            # merged PR's author for this commit. Authorization happened at PR
            # time (authorize.yml against the shellcade link); this is cosmetic
            # only, so a missing/failed lookup just omits the @mention — it must
            # NEVER fail the publish.
            mapped=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
                       -q '.[0].user.login' 2>/dev/null || true)
            if [ "$mapped" = "null" ]; then mapped=""; fi

            # Release-profile build, per module marker.
            if [ -f "$d/go.mod" ]; then
              ( cd "$d" && go mod tidy && tinygo build -opt=2 -no-debug -gc=leaking \
                  -o game.wasm -target wasip1 -buildmode=c-shared . )
            else
              # Rust: the crate's own [profile.release] carries the size/lto
              # settings; the artifact lands under target/ named after the
              # crate (hyphens become underscores).
              crate=$(sed -n 's/^name *= *"\(.*\)"/\1/p' "$d/Cargo.toml" | head -1)
              ( cd "$d" && cargo build --release --target wasm32-wasip1 )
              cp "$d/target/wasm32-wasip1/release/${crate//-/_}.wasm" "$d/game.wasm"
            fi
            digest=$(sha256sum "$d/game.wasm" | cut -d' ' -f1)
            echo "digest: sha256:$digest"

            # Next version integer N from existing <owner>-<game>-vN tags.
            prefix="${owner}-${game}-v"
            last=$(git tag -l "${prefix}*" | sed -E "s/^${prefix}//" \
                   | grep -E '^[0-9]+$' | sort -n | tail -1 || true)
            if [ -z "$last" ]; then
              # No prior release: this is v1.
              next=1
            else
              # Idempotency: if the newest release already pins this exact
              # digest, the content is unchanged — skip the re-run.
              prev_tag="${prefix}${last}"
              prev_digest=$(gh release view "$prev_tag" --json body \
                            --jq '.body' 2>/dev/null \
                            | grep -oE 'digest: sha256:[0-9a-f]{64}' \
                            | sed 's/digest: sha256://' | head -1 || true)
              if [ "$prev_digest" = "$digest" ]; then
                echo "$prev_tag already pins sha256:$digest — nothing to publish"
                continue
              fi
              next=$((last + 1))
            fi

            tag="${prefix}${next}"
            asset="${owner}-${game}-v${next}.wasm"
            cp "$d/game.wasm" "$asset"

            # Attribution line: include the @mention only when we resolved one.
            if [ -n "$mapped" ]; then
              headline="Catalog release of \`${owner}/${game}\` (v${next}), attributed to @${mapped}."
            else
              headline="Catalog release of \`${owner}/${game}\` (v${next})."
            fi
            notes=$(printf '%s\n\n%s\n%s\n' \
              "$headline" \
              "path: ${d}" \
              "digest: sha256:${digest}")

            # Optional human release notes: the top section of the game's
            # CHANGELOG.md (first heading to the next same-level heading) is
            # folded into the release body. No changesets machinery — games
            # have no downstream consumers; vN + digest carry identity.
            if [ -f "$d/CHANGELOG.md" ]; then
              top=$(awk '/^## /{n++} n==1{print} n==2{exit}' "$d/CHANGELOG.md")
              if [ -n "$top" ]; then
                notes=$(printf '%s\n\n%s\n' "$notes" "$top")
              fi
            fi

            # Idempotent create-or-append: tag may race or pre-exist on re-run.
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release upload "$tag" "$asset" --clobber
            else
              gh release create "$tag" "$asset" \
                --title "${owner}/${game} v${next}" \
                --notes "$notes" \
                --target "${{ github.sha }}"
            fi
            echo "published $tag ($asset)"

            # Arcade auto-publish — FAIL-SOFT: a missing secret or an
            # unreachable arcade never fails the release (the admin area can
            # always verify+promote manually). The endpoint is idempotent, so
            # a re-run re-verifies and re-applies the policy without
            # duplicating anything.
            if [ -n "${ADMIN_SECRET}" ]; then
              body=$(printf '{"tag":"%s","githubUser":"%s"}' "$tag" "$mapped")
              resp=$(curl -sS -m 90 -X POST \
                       -H "Authorization: Bearer ${ADMIN_SECRET}" \
                       -H "Content-Type: application/json" \
                       -d "$body" "${PUBLISH_ENDPOINT}" || true)
              echo "game:publish → ${resp:-no response (arcade unreachable; promote via Admin tools)}"
            else
              echo "SHELLCADE_ADMIN_SECRET not set — skipping arcade auto-publish"
            fi
          done <<< "${{ steps.changed.outputs.dirs }}"
